name: Deploy SSO to Prod Server

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy:
    environment: prod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN_PUSH }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push SSO image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sejong-voice-sso:prod
            ${{ secrets.DOCKERHUB_USERNAME }}/sejong-voice-sso:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare server directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: mkdir -p ~/sejong-voice-sso/docker

      - name: Upload compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: docker/docker-compose.prod.yml
          target: ~/sejong-voice-sso

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/sejong-voice-sso
            cat > .env <<EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            PORT=8081
            EOF

            echo "${{ secrets.DOCKERHUB_TOKEN_PULL }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose --env-file .env -f docker/docker-compose.prod.yml pull sso
            docker compose --env-file .env -f docker/docker-compose.prod.yml up -d sso

            for i in $(seq 1 12); do
              if docker compose --env-file .env -f docker/docker-compose.prod.yml exec -T sso curl -fsS http://127.0.0.1:8081/healthz > /dev/null; then
                exit 0
              fi
              sleep 5
            done

            docker compose --env-file .env -f docker/docker-compose.prod.yml ps
            exit 1
