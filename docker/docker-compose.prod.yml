name: sejong-voice

services:
  sso:
    image: ${DOCKERHUB_USERNAME}/sejong-voice-sso:prod
    restart: unless-stopped
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  default:
    external: true
    name: sejong-voice_default
